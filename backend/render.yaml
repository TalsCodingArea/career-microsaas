services:
  - type: web
    name: career-microsaas-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_ORIGIN
        value: https://frontend-eight-taupe-50.vercel.app
      - key: MONGODB_URI
        sync: false
